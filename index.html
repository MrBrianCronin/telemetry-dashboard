<!DOCTYPE html>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#FAFBFD;font-family:'DM Sans',sans-serif}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .pre-header{background:#fff;border-bottom:1px solid #E2E6EF;padding:20px 32px;display:flex;align-items:center;gap:12px}
    .pre-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#10B981,#059669);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;font-family:'Outfit',sans-serif}
    .pre-title{font-size:20px;font-weight:700;font-family:'Outfit',sans-serif;color:#1A1F36}
    .pre-sub{font-size:12px;color:#8792A8;margin-top:2px}
    .pre-content{padding:32px;max-width:1200px;margin:0 auto}
    .pre-status{text-align:center;padding:12px;font-size:13px;color:#8792A8;margin-bottom:20px}
    .pre-status span{display:inline-block;animation:shimmer 1.8s ease-in-out infinite;background:linear-gradient(90deg,#8792A8 25%,#B0B8C8 50%,#8792A8 75%);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .pre-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px}
    .pre-card{background:#fff;border-radius:16px;padding:24px 20px;border:1px solid #E2E6EF}
    .s{border-radius:6px;background:linear-gradient(90deg,#E8EBF0 25%,#F0F2F5 50%,#E8EBF0 75%);background-size:200% 100%;animation:shimmer 1.8s ease-in-out infinite}
    .pre-chart{background:#fff;border-radius:16px;padding:24px;border:1px solid #E2E6EF;margin-bottom:28px}
    .pre-bars{display:flex;align-items:flex-end;gap:8px;height:180px;padding-top:20px}
    .pre-bar{flex:1;border-radius:4px 4px 0 0;background:linear-gradient(90deg,#E8EBF0 25%,#F0F2F5 50%,#E8EBF0 75%);background-size:200% 100%;animation:shimmer 1.8s ease-in-out infinite}
    .pre-2col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
    @media(max-width:768px){.pre-header{padding:14px 16px}.pre-title{font-size:16px}.pre-sub{display:none}.pre-content{padding:16px}.pre-grid{grid-template-columns:1fr 1fr}.pre-2col{grid-template-columns:1fr}}
  </style>
</head>
